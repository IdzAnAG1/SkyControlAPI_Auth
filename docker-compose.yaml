services:

  postgres:
    image: postgres:12.2-alpine
    container_name: postgres_auth_container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${AUTH_DATABASE_USER}
      POSTGRES_PASSWORD: ${AUTH_DATABASE_PASSWORD}
      POSTGRES_DB: ${AUTH_DATABASE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    image: ${DOCKER_LOGIN}/sc-auth-migrator:latest
    container_name: sc-auth-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: "postgres"
      GOOSE_DBSTRING: "user=${AUTH_DATABASE_USER} password=${AUTH_DATABASE_PASSWORD} host=postgres dbname=${AUTH_DATABASE_NAME} sslmode=disable"
    command: goose up -dir ./migrations

  app:
    image: ${DOCKER_LOGIN}/scauth:latest
    container_name: sc-auth
    depends_on:
      migrator:
        condition: service_completed_successfully
    env_file:
      - $HOME/.env
    ports:
      - ${EXTERNAL_PORT}:${APP_CONTAINER_PORT}